<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="140" height="140">
  <defs>
    <!-- Aura glow -->
    <radialGradient id="auraGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#00D9FF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Aura background -->
  <circle cx="100" cy="100" r="90" fill="url(#auraGlow)"/>
  <circle cx="100" cy="95" r="60" fill="none" stroke="#00D9FF" stroke-width="0.5" opacity="0.3"/>

  <!-- Left ear - outer -->
  <path d="M42,75 L55,18 L72,75" fill="#3D5A8C" stroke="#2A4060" stroke-width="1"/>
  <!-- Left ear - inner cream -->
  <path d="M50,68 L55,28 L64,68" fill="#D4B483"/>

  <!-- Right ear - outer -->
  <path d="M128,75 L145,18 L158,75" fill="#3D5A8C" stroke="#2A4060" stroke-width="1"/>
  <!-- Right ear - inner cream -->
  <path d="M136,68 L145,28 L150,68" fill="#D4B483"/>

  <!-- Head spike -->
  <path d="M82,52 L100,28 L118,52" fill="#3D5A8C" stroke="#2A4060" stroke-width="1" filter="url(#glow)"/>
  <path d="M88,50 L100,33 L112,50" fill="#2C2C3E" opacity="0.3"/>

  <!-- Head -->
  <ellipse cx="100" cy="90" rx="45" ry="42" fill="#3D5A8C"/>

  <!-- Dark face band -->
  <path d="M60,82 Q100,72 140,82 Q140,95 100,90 Q60,95 60,82" fill="#2C2C3E" opacity="0.4"/>

  <!-- Face mask - cream area -->
  <ellipse cx="100" cy="105" rx="30" ry="22" fill="#D4B483"/>

  <!-- Eyes -->
  <ellipse cx="82" cy="90" rx="7" ry="5.5" fill="#CC3333"/>
  <ellipse cx="118" cy="90" rx="7" ry="5.5" fill="#CC3333"/>
  <!-- Eye shine -->
  <ellipse cx="84" cy="88" rx="3" ry="2" fill="#FF6666" opacity="0.7"/>
  <ellipse cx="120" cy="88" rx="3" ry="2" fill="#FF6666" opacity="0.7"/>
  <!-- Eye pupils -->
  <ellipse cx="82" cy="91" rx="3.5" ry="3" fill="#8B0000"/>
  <ellipse cx="118" cy="91" rx="3.5" ry="3" fill="#8B0000"/>

  <!-- Nose -->
  <path d="M97,100 L100,104 L103,100" fill="#2C2C3E"/>

  <!-- Mouth hint -->
  <path d="M94,107 Q100,110 106,107" fill="none" stroke="#2C2C3E" stroke-width="0.8"/>

  <!-- Chest spike -->
  <path d="M95,118 L100,125 L105,118" fill="#3D5A8C" filter="url(#glow)"/>

  <!-- Aura sphere (small, floating) -->
  <circle cx="155" cy="130" r="12" fill="#00D9FF" opacity="0.15" filter="url(#softGlow)"/>
  <circle cx="155" cy="130" r="8" fill="#00D9FF" opacity="0.25"/>
  <circle cx="155" cy="130" r="4" fill="#00D9FF" opacity="0.5"/>
  <circle cx="153" cy="128" r="1.5" fill="#FFFFFF" opacity="0.6"/>
</svg>
